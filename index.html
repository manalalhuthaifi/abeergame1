<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغامرات مس عبير</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

:root{
--primary:#2e7d32;
--secondary:#ffca28;
--accent:#e65100;
--bg:#f1f8e9;
--forest:#1b5e20;
--danger:#c62828;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
background:var(--bg);
height:100vh;
overflow:hidden;
}

.screen{
display:none;
background:#fff;
border-radius:30px;
padding:20px;
max-width:1100px;
width:100%;
margin:auto;
border:6px solid var(--primary);
text-align:center;
}

.screen.active{display:block;}

h1{font-size:3rem;color:var(--forest);}
h2{color:var(--accent);}

button{
background:linear-gradient(135deg,var(--primary),var(--forest));
color:white;
border:none;
padding:15px 30px;
border-radius:40px;
font-size:1.2rem;
cursor:pointer;
margin:8px;
}

.end-btn{
background:linear-gradient(135deg,var(--danger),#8e0000);
}

.start-layout{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:10px;
padding:10px;
}

/* تكبير الشخصية */
.abeer-img{
width:100%;
max-width:500px;
height:auto;
display:block;
margin:auto;
}

/* شبكة الحروف */
.letters-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:15px;
margin-top:20px;
}

.letter-btn{
font-size:2.5rem;
border:3px solid var(--primary);
border-radius:15px;
padding:10px;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- البداية -->
<div id="screen-start" class="screen active">
<div class="start-layout">

<div>
<img src="abeer.png" class="abeer-img">
</div>

<div>
<h1>مغامرات مس عبير</h1>
<h2>تحدي الحروف الكشفية</h2>
<button onclick="showScreen('screen-setup')">ابدأ المغامرة</button>
</div>

</div>
</div>

<!-- الإعداد -->
<div id="screen-setup" class="screen">
<h2>عدد الفرق</h2>
<input id="num" type="number" value="2">
<br>
<button onclick="startGame()">ابدأ</button>
<button class="end-btn" onclick="end()">إنهاء</button>
</div>

<!-- اللعب -->
<div id="screen-letters" class="screen">
<h2 id="turn-text"></h2>
<div id="letters-grid" class="letters-grid"></div>
<button class="end-btn" onclick="end()">إنهاء المسابقة</button>
</div>

<!-- السؤال -->
<div id="screen-question" class="screen">
<h1 id="letter"></h1>
<h2 id="q"></h2>
<p id="a" class="hidden"></p>

<button onclick="showAns()">إظهار الإجابة</button>
<button onclick="handle(true)">صح</button>
<button onclick="handle(false)">خطأ</button>
<button class="end-btn" onclick="end()">إنهاء</button>
</div>

<!-- النهاية -->
<div id="screen-end" class="screen">
<h1>النتائج</h1>
<div id="results"></div>
<button onclick="location.reload()">إعادة</button>
</div>

<script>

const DATA=[
{l:"أ",q:"أول خطوة بالإسعاف؟",a:"التأمين"},
{l:"ت",q:"أول خطوة غسل اليدين؟",a:"تبليل"},
{l:"ث",q:"تبريد الطعام؟",a:"ثلج"},
{l:"ج",q:"إصابة الجلد؟",a:"جرح"},
{l:"ح",q:"أدوات الإسعاف؟",a:"حقيبة"}
];

let teams=[];
let turn=0;
let used=[];

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function startGame(){
teams=[{name:"فريق 1",score:0},{name:"فريق 2",score:0}];
render();
showScreen('screen-letters');
}

function render(){
document.getElementById('turn-text').innerText="دور "+teams[turn].name;

let grid=document.getElementById('letters-grid');
grid.innerHTML="";

DATA.forEach((item,i)=>{
let btn=document.createElement('div');
btn.className="letter-btn";
btn.innerText=item.l;
btn.onclick=()=>ask(i);
grid.appendChild(btn);
});
}

function ask(i){
let item=DATA[i];
document.getElementById('letter').innerText=item.l;
document.getElementById('q').innerText=item.q;
document.getElementById('a').innerText=item.a;
document.getElementById('a').classList.add('hidden');
showScreen('screen-question');
}

function showAns(){
document.getElementById('a').classList.remove('hidden');
}

function handle(ok){
if(ok) teams[turn].score+=10;
turn=(turn+1)%teams.length;
render();
showScreen('screen-letters');
}

function end(){
showScreen('screen-end');
let html="";
teams.forEach(t=>{
html+=t.name+" : "+t.score+" نقطة<br>";
});
document.getElementById('results').innerHTML=html;
}

</script>

</body>
</html>
