<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرات عبير - تحدي الحروف الكشفية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --primary: #2e7d32;
            --secondary: #ffca28;
            --accent: #e65100;
            --white: #ffffff;
            --bg-light: #f1f8e9;
            --forest: #1b5e20;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }

        body { background-color: var(--bg-light); overflow: hidden; height: 100vh; }

        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .screen {
            display: none; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border-radius: 40px; padding: 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            text-align: center; max-width: 1000px; width: 100%; border: 8px solid var(--primary);
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto;
        }

        .screen.active { display: block; }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { color: var(--forest); font-size: 3.5rem; font-weight: 900; text-shadow: 2px 2px 0 var(--secondary); margin-bottom: 10px; }
        h2 { color: var(--accent); font-size: 2.2rem; margin-bottom: 20px; }

        /* حاوية الصورة المرفوعة */
        .abeer-img-container {
          .abeer-img-container {
    width: 420px;
    height: auto;
    margin: 0 auto 10px;
}
        }

        .abeer-img {
    width: 100%;
    height: auto;
    display: block;
}
        }

        @keyframes floatAbeer { 
            0%, 100% { transform: translateY(0) rotate(-3deg); } 
            50% { transform: translateY(-25px) rotate(3deg); } 
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--forest));
            color: white; border: none; padding: 18px 45px; font-size: 1.8rem;
            font-weight: bold; border-radius: 60px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 0 #0a3d0d; margin: 10px;
        }

        button:hover { transform: translateY(-5px); box-shadow: 0 12px 0 #0a3d0d; }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #0a3d0d; }

        .letters-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 20px; margin: 30px 0;
        }

        .letter-btn {
            background: var(--white); border: 4px solid var(--primary); border-radius: 20px;
            font-size: 3.5rem; font-weight: 900; color: var(--primary); padding: 15px;
            cursor: pointer; transition: 0.4s; box-shadow: 0 8px 0 var(--primary);
        }

        .letter-btn:hover:not(.disabled) { 
            background: var(--secondary); 
            transform: scale(1.1) rotate(5deg);
            color: var(--forest);
        }
        .letter-btn.disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: scale(0.9); }

        .team-box {
            background: var(--white); padding: 15px 30px; border-radius: 25px;
            border: 4px solid #ddd; min-width: 180px; transition: 0.4s; display: inline-block; margin: 10px;
        }

        .team-box.active { border-color: var(--accent); background: var(--secondary); transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .question-panel {
            font-size: 2.5rem; font-weight: 900; padding: 40px; border: 6px dashed var(--primary);
            border-radius: 30px; margin: 25px 0; background: #fff; color: var(--forest);
        }

        .timer-track { width: 100%; height: 25px; background: #eee; border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 3px solid #ddd; }
        #timer-progress { width: 100%; height: 100%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336); transition: width 1s linear; }

        .hidden { display: none !important; }
        input { padding: 15px; font-size: 1.6rem; border: 3px solid var(--primary); border-radius: 20px; text-align: center; margin: 10px; width: 250px; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="ui-layer">
        <!-- شاشة البداية -->
        <div id="screen-start" class="screen active">
            <div class="abeer-img-container">
                <!-- تم استخدام معرف الصورة المرفوعة مباشرة -->

                <img src="abeer.png" alt="عبير الكشفية" class="abeer-img"><img >
            </div>
            <h1>مغامرات الكشافة عبير</h1>
            <h2>تحدي الحروف الكشفية 🏕️</h2>
            <button onclick="showScreen('screen-setup')">ابدأ المغامرة ←</button>
        </div>

        <!-- شاشة الإعداد -->
        <div id="screen-setup" class="screen">
            <h2>تجهيز الفرق الكشفية</h2>
            <div style="margin: 20px 0;">
                <p style="font-size: 1.5rem;">عدد الفرق المشاركة:</p>
                <input type="number" id="num-teams" min="1" max="4" value="2" onchange="createInputs()">
            </div>
            <div id="input-area" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
            <button onclick="startGame()">جاهزون للانطلاق!</button>
        </div>

        <!-- شاشة اللعب -->
        <div id="screen-letters" class="screen">
            <div id="status-bar"></div>
            <h2 id="turn-text" style="margin-top:30px; color: var(--forest);">دور فريق: ... (اختر حرفاً)</h2>
            <div class="letters-grid" id="letters-grid"></div>
        </div>

        <!-- شاشة السؤال -->
        <div id="screen-question" class="screen">
            <div class="timer-track"><div id="timer-progress"></div></div>
            <h1 id="current-letter" style="font-size: 7rem; color: var(--accent); margin-bottom: 10px;">أ</h1>
            <div class="question-panel" id="q-text">السؤال؟</div>
            <div id="ans-box" class="hidden" style="font-size: 2.3rem; color: var(--primary); margin-bottom: 25px; font-weight: bold; background: #f9fbe7; padding: 25px; border-radius: 20px; border: 3px solid var(--secondary);"></div>
            
            <div id="q-controls">
                <button onclick="showAns()">كشف الإجابة الصحيحة 🔍</button>
            </div>
            <div id="grade-controls" class="hidden">
                <button onclick="handleResult(true)" style="background: var(--primary);">إجابة صحيحة ✅</button>
                <button onclick="handleResult(false)" style="background: var(--accent);">إجابة خاطئة ❌</button>
            </div>
        </div>

        <!-- النهاية -->
        <div id="screen-end" class="screen">
            <div class="abeer-img-container">
                 <img src="82766a42-6db7-4c13-82e0-ec6df9ef2a4e-removebg-preview.png" alt="مبروك" class="abeer-img">
            </div>
            <h1>مبروك للأبطال! 🏆</h1>
            <div id="final-results" style="font-size: 2.5rem; margin: 30px 0; color: var(--forest);"></div>
            <button onclick="location.reload()">لعب مغامرة جديدة 🔄</button>
        </div>
    </div>

<script>
    // بيانات الأسئلة المستوحاة من الدليل الصحي الكشفي
    const DATA = [
        { l: "أ", q: "ما هي أول خطوة في إسعاف الجروح والحروق؟", a: "تأمين المكان وتطمين المصاب" },
        { l: "ب", q: "أداة كشفية هامة لتحديد الاتجاهات في الغابة؟", a: "البوصلة" },
        { l: "ت", q: "إجراء يومي للخيمة للتخلص من الرطوبة والقضاء على الحشرات؟", a: "التهوية المستمرة" },
        { l: "ج", q: "تلف في أنسجة الجلد يجب غسله بالماء الجاري وتطهيره؟", a: "الجرح" },
        { l: "ح", q: "حقيبة تلازم الكشاف في كل رحلة لحالات الطوارئ؟", a: "حقيبة الإسعافات الأولية" },
        { l: "خ", q: "مكان مبيت الكشافة الذي يجب تنظيمه باستمرار؟", a: "الخيمة" },
        { l: "ر", q: "نزيف من الأنف يُسعف بإمالة الرأس للأمام والضغط على الأنف؟", a: "الرعاف" },
        { l: "س", q: "سلوك صحي وقائي يمنع انتقال العدوى قبل الأكل؟", a: "غسل اليدين جيداً" },
        { l: "ش", q: "أداة تستخدم لتغطية الجروح ومنع تلوثها؟", a: "الشاش المعقم" },
        { l: "ص", q: "مادة تستخدم مع الماء لقتل الجراثيم عند التنظيف؟", a: "الصابون" },
        { l: "ع", q: "كائن لدغته خطيرة ويجب عدم تحريك العضو المصاب عند التعرض له؟", a: "العقرب" },
        { l: "ق", q: "أداة في حقيبة الإسعافات لقص الضمادات الطبية؟", a: "المقص" },
        { l: "م", q: "رباط كشفي مثلث يستخدم لتعليق اليد المصابة؟", a: "المنديل الكشفي" },
        { l: "ن", q: "فقدان الدم من الجسم ويجب إيقافه بالضغط المباشر؟", a: "النزيف" },
        { l: "هـ", q: "منظمة إنسانية شعارها الهلال وتسعف المصابين؟", a: "الهلال الأحمر السعودي" }
    ];

    let teams = [];
    let turn = 0;
    let used = [];
    let clock;

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function drawBg() {
        // سماء زرقاء صافية
        ctx.fillStyle = '#e1f5fe';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        // رسم تلال خضراء كشفية
        ctx.fillStyle = '#81c784';
        ctx.beginPath(); ctx.arc(canvas.width*0.2, canvas.height + 250, 700, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#a5d6a7';
        ctx.beginPath(); ctx.arc(canvas.width*0.8, canvas.height + 200, 600, 0, Math.PI*2); ctx.fill();

        requestAnimationFrame(drawBg);
    }
    drawBg();

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function createInputs() {
        const n = document.getElementById('num-teams').value;
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        for(let i=1; i<=n; i++) area.innerHTML += `<input type="text" id="t-${i}" placeholder="اسم الفريق ${i}" value=" الفريق  ${i}">`;
    }
    createInputs();

    function startGame() {
        const n = document.getElementById('num-teams').value;
        teams = [];
        for(let i=1; i<=n; i++) {
            let name = document.getElementById(`t-${i}`).value || `الفريق  ${i}`;
            teams.push({ name: name, score: 0 });
        }
        render();
        showScreen('screen-letters');
    }

    function render() {
        const bar = document.getElementById('status-bar');
        bar.innerHTML = '';
        teams.forEach((t, i) => {
            bar.innerHTML += `<div class="team-box ${i===turn?'active':''}"><b>${t.name}</b><br>${t.score} نقطة</div>`;
        });
        document.getElementById('turn-text').innerText = `الآن دور: ${teams[turn].name} (اختر حرفاً)`;

        const grid = document.getElementById('letters-grid');
        grid.innerHTML = '';
        DATA.forEach((item, idx) => {
            const btn = document.createElement('div');
            btn.className = 'letter-btn' + (used.includes(idx) ? ' disabled' : '');
            btn.innerText = item.l;
            if(!used.includes(idx)) btn.onclick = () => ask(idx);
            grid.appendChild(btn);
        });
    }

    function ask(idx) {
        used.push(idx);
        const item = DATA[idx];
        document.getElementById('current-letter').innerText = item.l;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('ans-box').innerText = "الإجابة الصحيحة: " + item.a;
        document.getElementById('ans-box').classList.add('hidden');
        document.getElementById('q-controls').classList.remove('hidden');
        document.getElementById('grade-controls').classList.add('hidden');
        showScreen('screen-question');

        let time = 20;
        const bar = document.getElementById('timer-progress');
        bar.style.width = '100%';
        clearInterval(clock);
        clock = setInterval(() => {
            time--;
            bar.style.width = (time/20)*100 + '%';
            if(time <= 0) { clearInterval(clock); showAns(); }
        }, 1000);
    }

    function showAns() {
        clearInterval(clock);
        document.getElementById('ans-box').classList.remove('hidden');
        document.getElementById('q-controls').classList.add('hidden');
        document.getElementById('grade-controls').classList.remove('hidden');
    }

    function handleResult(isWin) {
        if(isWin) teams[turn].score += 10;
        turn = (turn + 1) % teams.length;
        if(used.length === DATA.length) {
            end();
        } else {
            render();
            showScreen('screen-letters');
        }
    }

    function end() {
        showScreen('screen-end');
        const s = [...teams].sort((a,b)=>b.score-a.score);
        document.getElementById('final-results').innerHTML = s.map((t, idx) => `
            <p style="font-weight: ${idx===0?'900':'normal'}; color: ${idx===0?'var(--accent)':'var(--forest)'}">
                ${idx===0?'🥇':''} ${t.name}: ${t.score} نقطة
            </p>
        `).join('');
    }
</script>
</body>
</html>
